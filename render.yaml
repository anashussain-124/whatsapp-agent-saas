services:
  - type: web
    name: whatsapp-agent
    runtime: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://whatsapp-agent.onrender.com
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/whatsapp_agent.db
      - key: OPENROUTER_MODEL
        value: openrouter/owl-alpha
      - key: OPENROUTER_MAX_TOKENS
        value: "300"
      - key: RATE_LIMIT_PER_PHONE_PER_MIN
        value: "20"
      - key: CONVERSATION_TTL_HOURS
        value: "6"
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/agent/data
      sizeGB: 1
